# Dailey OS project declaration.
#
# We added @aws-sdk/client-s3 to package.json on a project that was deployed
# before auto-detection would have noticed it. To guarantee Dailey injects the
# S3_* env vars (S3_ENDPOINT, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY,
# S3_REGION, S3_BUCKET_NAME) into our pod, declare storage explicitly here
# instead of relying on the package.json scan.
#
# Reference: https://docs.dailey.cloud/docs/storage
services:
  storage:
    enabled: true
